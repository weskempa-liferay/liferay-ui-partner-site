<div class="platform-video">
    <div class="container container-fluid-max-xl">
        <div class="row align-items-center">
            <div class="col-md-5 mb-5 mb-md-0">
                <div class="video-content pr-md-4">
                    <h2 class="video-title" data-lfr-editable-id="title" data-lfr-editable-type="text">
                        A platform that opens possibilities
                    </h2>
                    <p class="video-subtitle" data-lfr-editable-id="subtitle" data-lfr-editable-type="text">
                        Discover how our innovative payment solutions are helping businesses of all sizes unlock new
                        markets, streamline operations, and deliver better customer experiences.
                    </p>
                </div>
            </div>
            <div class="col-md-7">
                <div class="video-wrapper">
                    <img src="[resources:video-thumbnail.png]"
                        alt="Video Thumbnail" class="video-thumb" data-lfr-editable-id="videoThumb"
                        data-lfr-editable-type="image">
                    <div class="play-button">
                        <svg viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" fill="white" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
